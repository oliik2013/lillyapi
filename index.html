<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Pics API</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 720px;
        margin: 3rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      code { background: #f3f3f3; padding: 0.1rem 0.3rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Cat Pics API (GitHub Pages)</h1>
    <p>
      Use <code>/random/</code> to get redirected to a random image file from
      <code>/pics/</code>.
    </p>
    <p>
      Add your cat images in the <code>pics/</code> folder and run
      <code>node scripts/generate-image-list.mjs</code> before pushing.
    </p>
    <p>
      Example endpoint:
      <a href="./random/">./random/</a>
    </p>
  </body>
</html>
